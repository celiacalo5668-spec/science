name: Weekly Content Update

on:
  schedule:
    # Every Friday at 12:00 UTC (noon)
    - cron: '0 12 * * 5'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run article curator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_articles.py

      - name: Commit and push new articles
        run: |
          git config --local user.email "weekly-curator@scienceofwellness.com"
          git config --local user.name "Science of Wellness Bot"
          git add articles/ data/
          if git diff --staged --quiet; then
            echo "No new articles this week."
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | grep "^articles/" | wc -l)
            git commit -m "Weekly content update: ${ARTICLE_COUNT} new article(s) — $(date '+%Y-%m-%d')"
            git push
            echo "✓ Pushed ${ARTICLE_COUNT} new article(s) to main — Netlify will auto-deploy."
          fi
